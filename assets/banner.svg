<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 230" width="850" height="230" role="img" aria-label="Koral Bonfil, HR meets AI">
  <defs>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="washBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(96,165,250,0.22)"/>
      <stop offset="75%" stop-color="rgba(96,165,250,0)"/>
    </radialGradient>
    <radialGradient id="washBlue2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(96,165,250,0.12)"/>
      <stop offset="75%" stop-color="rgba(96,165,250,0)"/>
    </radialGradient>
    <clipPath id="rounded">
      <rect width="850" height="230" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="850" height="230" fill="#ffffff"/>
    <circle cx="830" cy="0" r="320" fill="url(#washBlue)"/>
    <circle cx="120" cy="260" r="260" fill="url(#washBlue2)"/>

    <text x="66" y="76" font-family="Inter,'Segoe UI',Ubuntu,Helvetica,Arial,sans-serif" font-size="13" font-weight="500" letter-spacing="4" fill="#8a94a6">HR · AI · AUTOMATION</text>
    <text x="64" y="134" font-family="'Space Grotesk','Segoe UI',Ubuntu,Helvetica,Arial,sans-serif" font-size="52" font-weight="700" fill="#1e2a4a">Koral Bonfil</text>
    <rect x="66" y="154" width="120" height="2.5" rx="1.25" fill="url(#rule)"/>
    <text x="66" y="188" font-family="Inter,'Segoe UI',Ubuntu,Helvetica,Arial,sans-serif" font-size="18" font-weight="400" fill="#3d4166">HR meets AI. I build the tools I wish existed.</text>
  </g>
</svg>

name: generate snake animation

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: koralbonfil-maker
          outputs: |
            dist/github-snake.svg?color_snake=#1e2a4a&color_dots=#eff6ff,#dbeafe,#93c5fd,#3b82f6,#1e2a4a
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#93c5fd

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
